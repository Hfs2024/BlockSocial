<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block - Reels</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>
    <header>
        <p class="logo">Block</p>
        <div>
            <i class="fas fa-user-plus" id="signUpBtn"></i>
            <i class="fas fa-film" id="reelsBtn"></i>
            <i class="fas fa-upload" onclick="window.location.href = '/upload'"></i>
            <i class="fas fa-search" onclick="window.location.href = '/search'"></i>
        </div>
    </header>

    <main class="container-reels">
        <input type="file" name="file" accept="video/*" id="fileInput" style="display: none;" required />
        <div class="center">
            <button style="width: 60%;" id="uploadBtn">Upload Reel</button>
        </div>
        <div class="reels-container"></div>
        <div class="center">
            <button id="prev-btn">
                <i class="fas fa-chevron-left"></i>
                Prev
            </button>
            <button id="next-btn">
                <i class="fas fa-chevron-right"></i>
                Next
            </button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Block</p>
    </footer>

    <!-- JavaScript -->
    <script src="js/get.js"></script>
    <script src="js/signup.js"></script>
    <script src="js/reels.js"></script>
    <script src="js/reels-val.js" type="module"></script>
</body>

</html>
