<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block - Home</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <header>
        <p class="logo">Block</p>
        <div>
            <i class="fas fa-user-plus" id="signUpBtn"></i>
            <i class="fas fa-film" id="reelsBtn"></i>
            <i class="fas fa-upload" onclick="window.location.href = '/upload'"></i>
            <i class="fas fa-search" onclick="window.location.href = '/search'"></i>
        </div>
    </header>

    <main class="container">
        <div class="left">
            <h1>What's on your mind today?</h1>
            <input id="create-post-title" type="text" placeholder="Enter post title..." /></br></br>
            <input id="create-post-keywords" type="text" placeholder="Enter post keywords..." /></br></br>
            <div class="groups-select-container">
                <select id="group-select">
                    <option value="" selected>No group chosen</option>
                </select></br></br>
            </div>
            <textarea id="create-post-content" placeholder="Enter post content..."></textarea>

            <div class="center">
                <p style="font-weight: bold; font-size: 20px;">Anonymous: </p>
                <div class="toggle-slider-container">
                    <div class="toggle-slider"></div>
                </div>
            </div>

            <div class="image-preview-container">
                <img id="image-preview" alt="Image preview" />
                <div class="center filters" style="justify-content: flex-start; overflow: auto;">
                    <button class="image_preview" data-filter="blur">Blur</button>
                    <button class="image_preview" data-filter="contrast">Contrast</button>
                    <button class="image_preview" data-filter="brightness">Brightness</button>
                    <button class="image_preview" data-filter="grayscale">Grayscale</button>
                    <button class="image_preview" data-filter="saturate">Saturate</button>
                    <button class="image_preview" data-filter="opacity">Opacity</button>
                </div>
                <button id="image-preview-btn">Submit</button>
            </div>

            <div class="button-group">
                <button id="post-load-feed-btn">Load group posts</button>
                <button id="create-post-btn">Create post</button>
                <input type="file" id="upload-image-input" accept="image/*" style="display: none;" />
                <button id="upload-image-btn">Upload image</button>
            </div>
        </div>

        <div class="right">
            <div id="viewing-post-from-who">
                <h2>Viewing post from: All</h2>
            </div>

            <div class="center-overflow">
                <button class="filter-posts-btn" data-filter="image">Filter Images</button>
                <button class="filter-posts-btn" data-filter="text">Filter Text</button>
                <button class="filter-posts-btn" data-filter="shares">Filter Forked (Shared)</button>
                <button class="filter-posts-btn" data-filter="all">Filter All</button>
            </div></br>

            <div id="posts-container">
                <!-- Posts will be loaded here -->
            </div>

            <div class="center">
                <button id="prev-btn">
                    <i class="fas fa-chevron-left"></i>
                    Prev
                </button>
                <button id="next-btn">
                    <i class="fas fa-chevron-right"></i>
                    Next
                </button>
            </div>
        </div>

        <div class="user-collections-list">
            <div class="center">
                <input class="search-collections" placeholder="Search collections..." />
                <button id="add-collection-btn" style="margin-top: 0;"><i class="fas fa-plus"></i></button>
            </div>

            <div class="collections-list"></div>
            <button style="width: 100%;" id="collection-list-select-btn">Select</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Block</p>
    </footer>

    <!-- JavaScript -->
    <script type="module">
        import { getUserTheme } from "/js/theme.js";
        getUserTheme(document.querySelector(".left"), document.querySelector(".right"));
    </script>

    <script src="js/checkLength.js"></script>
    <script src="js/get.js"></script>
    <script src="js/actions.js"></script>
    <script src="js/create_post.js"></script>
    <script src="js/signup.js"></script>
    <script src="js/reels.js"></script>
</body>

</html>
